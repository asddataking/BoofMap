<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>BoofMap — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        font-family: system-ui, -apple-system, sans-serif;
        background: #050505;
        color: #fafafa;
        text-align: center;
      }
      .logo {
        max-width: min(280px, 90vw);
        height: auto;
        margin-bottom: 1rem;
      }
      p { color: #a1a1aa; font-size: 0.9rem; line-height: 1.5; max-width: 20rem; }
      a {
        margin-top: 1.5rem;
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        background: linear-gradient(to right, #059669, #34d399);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/boofmaplogo.png" width="1774" height="887" alt="BoofMap" />
    <p>You’re offline. Cached pages may still work — reconnect to load fresh reports.</p>
    <a href="/">Try again</a>
  </body>
</html>
